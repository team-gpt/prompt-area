output:
  - summary

pre-commit:
  parallel: false
  commands:
    'lint staged files':
      priority: 1
      glob: '*.{js,jsx,ts,tsx,mjs}'
      run: pnpm lint
    'auto-format files on commit':
      priority: 2
      run: './node_modules/.bin/pretty-quick --staged'
    'build registry':
      priority: 3
      glob: 'registry/**/*.{js,jsx,ts,tsx,mjs}'
      run: pnpm registry:build && git add public/r/
